<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Senja Brew Café</title>

<style>
:root{
  --bg:#f6f1ea;
  --card:#ffffff;
  --accent:#7b5e46;
  --text:#2c2c2c;
  --muted:#6f6f6f;
  --soft:#e8ded3;
  --danger:#b23a3a;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
  background:#fff;
  border-bottom:1px solid #e6e6e6;
  position:sticky;
  top:0;
}

nav h1{
  font-size:18px;
  color:var(--accent);
}

nav button{
  margin-left:6px;
  padding:7px 10px;
  border:none;
  border-radius:8px;
  background:var(--soft);
  cursor:pointer;
}

/* PAGE */
.page{display:none;padding:18px;}
.active{display:block;}

/* MENU GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
}

.card h3{
  margin:5px 0;
  color:var(--accent);
}

/* TEXT */
.small{font-size:13px;color:var(--muted);}

.warn{
  font-size:12px;
  color:var(--danger);
  margin-top:5px;
}

/* INPUT */
input, textarea{
  width:100%;
  margin-top:6px;
  padding:7px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BUTTON */
button.add{
  margin-top:8px;
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
}

/* CART */
.cart{
  background:#fff;
  padding:12px;
  border-radius:12px;
  border:1px solid #eee;
}

.item{
  border-bottom:1px solid #eee;
  padding:8px 0;
  font-size:14px;
}

.total{
  margin-top:10px;
  font-weight:bold;
  color:var(--accent);
}

select{
  width:100%;
  padding:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<nav>
  <h1>Senja Brew ☕</h1>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('menu')">Menu</button>
    <button onclick="show('cart')">Cart (<span id="count">0</span>)</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Selamat Datang di Senja Brew</h2>
  <p class="small">Coffee • Dessert • Calm Experience</p>

  <p class="small">
    📶 WiFi: senjabrew_guest<br>
    🔑 Password: coffee123
  </p>
</div>

<!-- MENU -->
<div id="menu" class="page">
  <h2>🍰 Menu & Komposisi</h2>
  <div class="grid" id="menuList"></div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>🛒 Keranjang</h2>
  <div class="cart" id="cartList"></div>

  <p class="total">Total: Rp <span id="total">0</span></p>

  <h4>Pembayaran</h4>
  <select id="pay">
    <option>QRIS</option>
    <option>Cash</option>
    <option>Bank Transfer</option>
  </select>

  <button onclick="checkout()">Checkout</button>
</div>

<script>

function show(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

/* MENU + KOMPOSISI + ALLERGEN */
const menu = [
{
name:"Latte",
price:25000,
desc:"Espresso + steamed milk",
comp:"Biji kopi, susu sapi",
allergen:"Dairy (susu)"
},
{
name:"Cappuccino",
price:28000,
desc:"Espresso + milk foam",
comp:"Kopi, susu, foam",
allergen:"Dairy"
},
{
name:"Mocha",
price:30000,
desc:"Coffee + chocolate + milk",
comp:"Kopi, coklat, susu",
allergen:"Dairy, Cacao"
},
{
name:"Cheesecake",
price:27000,
desc:"Creamy cheese dessert",
comp:"Cream cheese, telur, biscuit",
allergen:"Dairy, Gluten, Egg"
},
{
name:"Brownies",
price:20000,
desc:"Chocolate dense cake",
comp:"Tepung, coklat, telur",
allergen:"Gluten, Egg"
},
{
name:"Croissant",
price:22000,
desc:"Buttery pastry",
comp:"Tepung, butter, susu",
allergen:"Gluten, Dairy"
}
];

let cart=[];
let total=0;

/* RENDER MENU */
function renderMenu(){
  let box=document.getElementById("menuList");

  menu.forEach((m,i)=>{
    box.innerHTML+=`
    <div class="card">
      <h3>${m.name}</h3>

      <div class="small">${m.desc}</div>

      <div class="small">
        <b>Komposisi:</b> ${m.comp}
      </div>

      <div class="warn">
        ⚠️ Allergens: ${m.allergen}
      </div>

      <div class="small">Rp ${m.price}</div>

      <input type="number" id="qty${i}" min="1" value="1">

      <textarea id="note${i}" placeholder="Catatan (contoh: less sugar)"></textarea>

      <button class="add" onclick="add(${i})">Tambah</button>
    </div>
    `;
  });
}

/* ADD */
function add(i){
  let qty=parseInt(document.getElementById("qty"+i).value);
  let note=document.getElementById("note"+i).value;

  if(qty<=0) return;

  cart.push({
    name:menu[i].name,
    price:menu[i].price,
    qty:qty,
    note:note,
    allergen:menu[i].allergen
  });

  total+=menu[i].price*qty;

  document.getElementById("count").innerText=cart.length;
  renderCart();
}

/* CART */
function renderCart(){
  let box=document.getElementById("cartList");
  box.innerHTML="";

  cart.forEach(i=>{
    box.innerHTML+=`
    <div class="item">
      <b>${i.name}</b><br>
      Qty: ${i.qty} | Rp ${i.price*i.qty}<br>
      <small>Note: ${i.note || "-"}</small><br>
      <small style="color:#b23a3a">⚠️ ${i.allergen}</small>
    </div>
    `;
  });

  document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function checkout(){
  if(cart.length===0){
    alert("Keranjang kosong!");
    return;
  }

  let pay=document.getElementById("pay").value;

  alert(
    "☕ Senja Brew Receipt\n\n"+
    "Payment: "+pay+"\n"+
    "Total: Rp "+total+"\n\n"+
    "Mohon perhatikan alergi sebelum konsumsi."
  );

  cart=[];
  total=0;
  document.getElementById("count").innerText=0;
  renderCart();
}

renderMenu();

</script>

</body>
</html>
